<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Ashkan Zanjani profile photo</title>
  <desc id="desc">Portrait photo for Ashkan Zanjani portfolio website.</desc>
  <defs>
    <clipPath id="clip"><circle cx="80" cy="80" r="76"/></clipPath>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#007AFF"/>
      <stop offset="0.55" stop-color="#64D2FF"/>
      <stop offset="1" stop-color="#BF5AF2"/>
    </linearGradient>
  </defs>
  <circle cx="80" cy="80" r="80" fill="url(#ring)"/>
  <image href="data:image/jpeg;base64," x="4" y="4" width="152" height="152" clip-path="url(#clip)" preserveAspectRatio="xMidYMid slice"/>
</svg>
